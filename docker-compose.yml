services:
  postgres:
    image: postgres:16
    container_name: courtmap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: courtmap
      POSTGRES_USER: courtmap
      POSTGRES_PASSWORD: courtmap-local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  neo4j:
    image: neo4j:5-community
    container_name: courtmap-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/courtmap-local
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j:/var/lib/neo4j/import

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
